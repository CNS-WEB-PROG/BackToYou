<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Details — BackToYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .details-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .details-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    /* ── Top banner ── */
    .details-banner {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .details-banner__emoji {
      font-size: 3rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .details-banner__info {
      flex: 1;
    }

    .details-banner__title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--navy);
      margin: 6px 0 4px;
    }

    .details-banner__meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .details-banner__meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── Body sections ── */
    .details-section {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }

    .details-section:last-child {
      border-bottom: none;
    }

    .details-section__label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .details-section__text {
      font-size: 0.925rem;
      color: var(--text-primary);
      line-height: 1.7;
      white-space: pre-line;
    }

    /* ── Contact box ── */
    .details-contact {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .details-contact__name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--navy);
    }

    .details-contact__sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .details-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      text-decoration: none;
    }

    .details-back:hover {
      color: var(--navy);
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge--open {
      background: #dcfce7;
      color: #16a34a;
    }

    .status-badge--claimed {
      background: #fef9c3;
      color: #ca8a04;
    }

    .status-badge--resolved {
      background: #f1f5f9;
      color: #64748b;
    }
  </style>
</head>

<body>

  <nav class="nav">
    <a href="../index.html" class="nav__logo">
      <span class="nav__logo-icon"><i class="fa-solid fa-clipboard-list"></i></span>
      BackToYou
    </a>
    <ul class="nav__links">
      <li><a href="browse.html">Browse Items</a></li>
      <li><a href="report-lost.html">Lost Something?</a></li>
      <li><a href="report-found.html">Found Something?</a></li>
    </ul>
    <div class="nav__auth">
      <a href="login.html" class="btn btn--ghost">Log in</a>
      <a href="register.html" class="btn btn--primary">Sign up</a>
    </div>
    <button class="nav__hamburger" aria-label="Open menu">&#9776;</button>
  </nav>

  <div class="page-header">
    <div class="page-header__inner">
      <p class="page-header__breadcrumb"><a href="../index.html">Home</a> &rsaquo; <a href="browse.html">Browse</a>
        &rsaquo; Item</p>
      <h1>Item details</h1>
    </div>
  </div>

  <div class="details-wrap">
    <a href="browse.html" class="details-back">
      ← Back to Browse
    </a>
    <div id="details-card" class="details-card">
      <div style="padding:40px; text-align:center; color:var(--text-muted);">
        Loading…
      </div>
    </div>
  </div>

  <footer class="footer" style="margin-top: 48px;">
    <div class="footer__inner">
      <div class="footer__logo">
        <span class="footer__logo-icon"><i class="fa-solid fa-clipboard-list"></i></span>
        BackToYou
      </div>
      <nav class="footer__links">
        <a href="browse.html">Browse</a>
        <a href="report-lost.html">Report Lost</a>
        <a href="report-found.html">Report Found</a>
        <a href="login.html">Log In</a>
      </nav>
      <p class="footer__copy">&copy; 2026 BackToYou. Built for schools.</p>
    </div>
  </footer>

  <script src="../js/nav.js"></script>
  <script src="../js/item-details.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
